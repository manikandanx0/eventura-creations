<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Eventura Creations</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <header>
    <nav class="main-nav" aria-label="Main navigation">
      <div class="nav-container">
        <a href="index.html" class="logo" aria-label="Eventura Creations home">
          <img src="./assets/logo/svg/logo-ghostwhite.svg" alt="Eventura Creations" class="logo-img">
        </a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="Toggle navigation">
          ☰
        </button>
        <ul class="nav-links" id="nav-links">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="services.html" class="nav-link">Services</a></li>
          <li><a href="projects.html" class="nav-link">Projects</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="contact.html" class="nav-link active" aria-current="page">Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <div class="container">
        <h1>Get in Touch</h1>
        <p class="contact-intro">Ready to create something exceptional? Let's talk about your next event.</p>
        
        <form class="contact-form" action="#" method="post">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>
          
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2025 Eventura Creations. All rights reserved.</p>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="services.html">Services</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
